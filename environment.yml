name: scmina
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # Python and core packages
  - python>=3.10,<3.13
  - pip
  
  # R and R packages
  - r-base=4.2.2
  - r-essentials
  # R packages for single-cell analysis
  - r-seurat=5.1.0
  - r-seuratobject=5.0.2
  - r-dplyr
  - r-ggplot2
  - r-matrix
  - r-fnn
  - bioconductor-chromvar
  - bioconductor-summarizedexperiment
  - bioconductor-genomicranges
  - bioconductor-figr
  - r-ggrastr
  - r-buencolors
  # - r-signac=1.15.0  # Install via R if needed

  # Python scientific stack
  - numpy>=1.21.0,<2.0.0
  - pandas>=1.3.0,<3.0.0
  - scipy>=1.7.0,<2.0.0
  - scikit-learn>=1.0.0,<2.0.0
  - matplotlib>=3.5.0,<4.0.0
  - seaborn>=0.11.0,<1.0.0
  
  # Single-cell analysis
  - scanpy>=1.8.0,<2.0.0
  - anndata>=0.8.0,<1.0.0
  
  # Utilities
  - tqdm>=4.60.0,<5.0.0
  - numba>=0.56.0,<1.0.0
 
  # Nextflow/runtime utilities
  - openjdk=11
  - graphviz
  - nextflow

  # Pip packages (for packages not available in conda)
  - pip:
    - scvi-tools>=1.0.0
    - scpair>=0.1.0
    - macs2>=2.2.9.1
    - captum>=0.6.0

# -----------------------------------------------------------------------------
# consider enabling the libmamba solver for speed/stability:
#   conda config --set solver libmamba
#   conda env create -f environment.yml
#   conda env update -f environment.yml
# -----------------------------------------------------------------------------